<div
  class="rounded-lg border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/3">
  <div class="flex flex-col gap-2 mb-3 sm:flex-row sm:justify-between">
    <div class="w-full">
      <h3 class="text-sm font-semibold text-gray-800 dark:text-white/90">
        Estadísticas
      </h3>
      <p class="mt-0.5 text-gray-500 text-[11px] dark:text-gray-400">
        Objetivos mensuales
      </p>
    </div>
    <div class="flex items-center w-full gap-2 sm:justify-end">
      <!-- ChartTab -->
      <p-selectButton [options]="periodOptions" [(ngModel)]="selectedPeriod" optionLabel="label" optionValue="value" class="p-selectbutton-sm" />

      <!-- date picker -->
      <p-datepicker [(ngModel)]="dateValue" selectionMode="range" [readonlyInput]="true"
        placeholder="Fechas" styleClass="w-full sm:w-auto p-inputtext-sm" />
    </div>
  </div>

  <div class="max-w-full overflow-x-auto custom-scrollbar">
    <div class="min-w-[800px] xl:min-w-full">
      <p-chart type="line" [data]="data" [options]="options" height="250px" />
    </div>
  </div>
</div>
