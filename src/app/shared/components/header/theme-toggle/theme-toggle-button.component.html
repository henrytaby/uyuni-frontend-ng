<p-button (onClick)="toggleTheme()" [outlined]="true" severity="secondary"
  styleClass="group h-9 w-9 border-gray-200 bg-white text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white rounded-full transition-colors flex items-center justify-center p-0">
  <ng-template pTemplate="content">
    @if ((theme$ | async) === 'dark') {
    <svg lucideSun size="20"></svg>
    } @else {
    <svg lucideMoon size="20"></svg>
    }
  </ng-template>
</p-button>
